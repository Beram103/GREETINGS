<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Uncle!</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a0a2e;
    overflow: hidden;
    font-family: 'Playfair Display', serif;
  }

  /* Animated gradient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, #3d0066 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, #660033 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, #003366 0%, transparent 50%),
                #0d0520;
    animation: bgShift 8s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(30deg); }
  }

  /* Confetti */
  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .confetti {
    position: absolute;
    width: 10px;
    height: 14px;
    top: -20px;
    animation: fall linear infinite;
    transform-origin: center;
  }

  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 60px 70px;
    max-width: 600px;
    width: 90vw;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,200,100,0.25);
    border-radius: 24px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 80px rgba(255,150,50,0.15), inset 0 0 40px rgba(255,255,255,0.03);
    animation: cardIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    opacity: 0;
    transform: scale(0.8) translateY(30px);
  }

  @keyframes cardIn {
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .emojis-top {
    font-size: 2.8rem;
    margin-bottom: 20px;
    animation: bounce 2s ease-in-out infinite;
    letter-spacing: 8px;
    display: block;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .happy {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2rem, 5vw, 3rem);
    color: #ffd580;
    letter-spacing: 2px;
    display: block;
    margin-bottom: 6px;
    animation: fadeSlideIn 0.8s 0.3s both;
    text-shadow: 0 0 30px rgba(255,213,128,0.5);
  }

  .birthday {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 9vw, 5.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, #ff6b6b, #ffd700, #ff9f43, #ee5a24);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientFlow 3s ease infinite, fadeSlideIn 0.8s 0.5s both;
    display: block;
    line-height: 1.1;
    letter-spacing: -1px;
  }

  @keyframes gradientFlow {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .uncle {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 700;
    color: #fff;
    display: block;
    margin-top: 4px;
    letter-spacing: 6px;
    text-transform: uppercase;
    animation: fadeSlideIn 0.8s 0.7s both;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .divider {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #ffd700, transparent);
    margin: 28px auto;
    animation: fadeSlideIn 0.8s 0.9s both;
  }

  .message {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.1rem, 2.5vw, 1.4rem);
    color: rgba(255,220,180,0.9);
    line-height: 1.8;
    animation: fadeSlideIn 0.8s 1.1s both;
    letter-spacing: 0.5px;
  }

  .emojis-bottom {
    font-size: 2rem;
    display: block;
    margin-top: 28px;
    letter-spacing: 10px;
    animation: fadeSlideIn 0.8s 1.3s both, pulse 1.5s 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .from {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    color: rgba(255,220,180,0.75);
    animation: fadeSlideIn 0.8s 1.5s both;
    margin-top: 4px;
  }

  .names {
    font-size: clamp(1.15rem, 3vw, 1.5rem);
    color: #ffd580;
    font-weight: 700;
    text-shadow: 0 0 16px rgba(255,213,128,0.5);
  }

  /* Sparkles */
  .sparkle {
    position: absolute;
    pointer-events: none;
    animation: sparkleAnim ease-in-out infinite;
  }

  .sparkle::before {
    content: '✦';
    color: #ffd700;
    font-size: 1.2rem;
    opacity: 0.7;
  }

  @keyframes sparkleAnim {
    0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
    50% { opacity: 1; transform: scale(1) rotate(180deg); }
  }
</style>
</head>
<body>

<div class="confetti-container" id="confetti"></div>

<div class="card">
  <span class="sparkle" style="top:10px;left:20px;animation-duration:2.1s;animation-delay:0.2s"></span>
  <span class="sparkle" style="top:15px;right:30px;animation-duration:1.8s;animation-delay:0.8s"></span>
  <span class="sparkle" style="bottom:20px;left:25px;animation-duration:2.4s;animation-delay:1.2s"></span>
  <span class="sparkle" style="bottom:15px;right:20px;animation-duration:1.6s;animation-delay:0.5s"></span>

  <span class="emojis-top">🎉🥳🎂</span>
  <span class="happy">Happy</span>
  <span class="birthday">Birthday</span>
  <span class="uncle">Uncle</span>

  <div class="divider"></div>

  <p class="message">
    Wishing you a day filled with joy,<br>
    laughter, and everything you love. 🎁<br>
    May this year bring you endless<br>
    happiness and wonderful memories!
  </p>

  <span class="emojis-bottom">🎈🍰🎊</span>

  <div class="divider"></div>
  <p class="from">With love from,<br><span class="names">Amber, Te Ingkay & Kuya Cy</span> 💛</p>
</div>

<script>
  const colors = ['#ff6b6b','#ffd700','#ff9f43','#a29bfe','#fd79a8','#00cec9','#6c5ce7','#fdcb6e'];
  const shapes = ['◆','●','▲','★','■'];
  const container = document.getElementById('confetti');

  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
    el.style.cssText = `
      left: ${Math.random() * 100}%;
      color: ${colors[Math.floor(Math.random() * colors.length)]};
      font-size: ${6 + Math.random() * 10}px;
      animation-duration: ${3 + Math.random() * 5}s;
      animation-delay: ${Math.random() * 5}s;
      opacity: ${0.5 + Math.random() * 0.5};
    `;
    container.appendChild(el);
  }
</script>
</body>
</html>
